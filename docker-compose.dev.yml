name: brain-local-micro

services:
  postgres:
    image: postgres:16-alpine
    container_name: brain-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-brain_dev}
      POSTGRES_USER: ${POSTGRES_USER:-brain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-brain_dev_pass}
    ports:
      - "${POSTGRES_PORT_HOST:-5432}:5432"
    volumes:
      - brain_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-brain} -d ${POSTGRES_DB:-brain_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    mem_limit: 768m
    cpus: 0.75
    networks:
      - brain_dev_net

  redis:
    image: redis:7-alpine
    container_name: brain-dev-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    ports:
      - "${REDIS_PORT_HOST:-6379}:6379"
    volumes:
      - brain_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 256m
    cpus: 0.5
    networks:
      - brain_dev_net

  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: brain-dev-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_PORT_HOST:-6333}:6333"
      - "${QDRANT_GRPC_PORT_HOST:-6334}:6334"
    volumes:
      - brain_qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:6333/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 512m
    cpus: 0.75
    networks:
      - brain_dev_net

  mock-llm:
    build:
      context: ./services/mock-llm
      dockerfile: Dockerfile
    container_name: brain-dev-mock-llm
    restart: unless-stopped
    profiles: ["mock-llm"]
    environment:
      MOCK_LLM_HOST: 0.0.0.0
      MOCK_LLM_PORT: 8080
      MOCK_LLM_MODEL: ${LLM_DEFAULT_MODEL:-mock-local}
      MOCK_LLM_MODE: ${MOCK_LLM_MODE:-rules}
      MOCK_LLM_LATENCY_MIN_MS: ${MOCK_LLM_LATENCY_MIN_MS:-40}
      MOCK_LLM_LATENCY_MAX_MS: ${MOCK_LLM_LATENCY_MAX_MS:-140}
      MOCK_LLM_ERROR_RATE: ${MOCK_LLM_ERROR_RATE:-0.0}
      MOCK_LLM_ERROR_STATUS: ${MOCK_LLM_ERROR_STATUS:-503}
      MOCK_LLM_ERROR_TRIGGER: ${MOCK_LLM_ERROR_TRIGGER:-trigger_error}
      MOCK_LLM_ALLOW_STREAM: ${MOCK_LLM_ALLOW_STREAM:-false}
    ports:
      - "${MOCK_LLM_PORT_HOST:-8081}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 128m
    cpus: 0.25
    networks:
      - brain_dev_net

volumes:
  brain_postgres_data:
  brain_redis_data:
  brain_qdrant_data:

networks:
  brain_dev_net:
    name: brain_dev_net
    driver: bridge
