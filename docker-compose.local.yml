name: brain-local

services:
  postgres:
    image: postgres:15
    container_name: brain-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: brain
      POSTGRES_PASSWORD: brain
      POSTGRES_DB: brain
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - brain_local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brain"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: brain-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - brain_local
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: brain-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - brain_local

  # ollama: Local host Ollama already running on port 11434
  # Uncomment if you need a dedicated container:
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: brain-ollama
  #   restart: unless-stopped
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   networks:
  #     - brain_local
  #   environment:
  #     - OLLAMA_HOST=0.0.0.0

  backend:
    build:
      context: ./backend
    container_name: brain-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env.local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      # ollama: commented out - using local host ollama on port 11434
      # ollama:
      #   condition: service_started
    networks:
      - brain_local
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - QDRANT_URL=${QDRANT_URL}
      - BRAIN_RUNTIME_MODE=local
      - BRAIN_EVENTSTREAM_MODE=${BRAIN_EVENTSTREAM_MODE}
      - AXE_TRUST_TIER=${AXE_TRUST_TIER:-unrestricted}
      - BRAIN_DMZ_GATEWAY_SECRET=${BRAIN_DMZ_GATEWAY_SECRET}
      - AXE_FUSION_ALLOW_LOCAL_REQUESTS=true
      - AXE_FUSION_ALLOW_LOCAL_FALLBACK=true
      - AXE_FUSION_ALLOWED_DEV_IPS=127.0.0.1,::1,localhost,172.18.0.1
      - BRAIN_EXTERNAL_EXECUTOR_PERMIT_SECRET=${BRAIN_EXTERNAL_EXECUTOR_PERMIT_SECRET:-dev-executor-permit-secret-change-me}
      - OPENCLAW_BASE_URL=${OPENCLAW_BASE_URL:-http://openclaw:8080}
      - OPENCLAW_API_KEY=${OPENCLAW_API_KEY:-}
      - PAPERCLIP_BASE_URL=${PAPERCLIP_BASE_URL:-http://host.docker.internal:3110}
      - PAPERCLIP_API_KEY=${PAPERCLIP_API_KEY:-}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).getcode()==200 else sys.exit(1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  axe_ui:
    build:
      context: ./frontend/axe_ui
    container_name: axe-ui
    restart: unless-stopped
    ports:
      - "3002:3000"
    env_file:
      - .env.local
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - brain_local

  openclaw:
    build:
      context: ./openclaw_worker
    container_name: brain-openclaw
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      - OPENCLAW_BIND_HOST=0.0.0.0
      - OPENCLAW_BIND_PORT=8080
      - BRAIN_API_BASE_URL=http://backend:8000
      - OPENCLAW_API_KEY=${OPENCLAW_API_KEY:-}
      - OPENCLAW_WORKER_TASK_TYPES=${OPENCLAW_WORKER_TASK_TYPES:-openclaw_work}
      - OPENCLAW_BRAIN_EMAIL=${OPENCLAW_BRAIN_EMAIL:-admin@test.com}
      - OPENCLAW_BRAIN_PASSWORD=${OPENCLAW_BRAIN_PASSWORD:-${BRAIN_ADMIN_PASSWORD}}
      - OPENCLAW_BRAIN_SERVICE_TOKEN=${OPENCLAW_BRAIN_SERVICE_TOKEN:-}
      - OPENCLAW_AGENT_ID=${OPENCLAW_AGENT_ID:-openclaw-worker}
      - BRAIN_EXTERNAL_EXECUTOR_PERMIT_SECRET=${BRAIN_EXTERNAL_EXECUTOR_PERMIT_SECRET:-dev-executor-permit-secret-change-me}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - brain_local
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5).getcode()==200 else sys.exit(1)",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  paperclip_worker:
    build:
      context: ./paperclip_worker
    container_name: brain-paperclip
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      - PAPERCLIP_BIND_HOST=0.0.0.0
      - PAPERCLIP_BIND_PORT=8080
      - BRAIN_API_BASE_URL=http://backend:8000
      - PAPERCLIP_BASE_URL=${PAPERCLIP_BASE_URL:-http://host.docker.internal:3110}
      - PAPERCLIP_EXECUTION_ENDPOINT=${PAPERCLIP_EXECUTION_ENDPOINT:-/api/executions}
      - PAPERCLIP_API_KEY=${PAPERCLIP_API_KEY:-}
      - PAPERCLIP_WORKER_TASK_TYPES=${PAPERCLIP_WORKER_TASK_TYPES:-paperclip_work}
      - PAPERCLIP_BRAIN_EMAIL=${PAPERCLIP_BRAIN_EMAIL:-admin@test.com}
      - PAPERCLIP_BRAIN_PASSWORD=${PAPERCLIP_BRAIN_PASSWORD:-${BRAIN_ADMIN_PASSWORD}}
      - PAPERCLIP_BRAIN_SERVICE_TOKEN=${PAPERCLIP_BRAIN_SERVICE_TOKEN:-}
      - PAPERCLIP_AGENT_ID=${PAPERCLIP_AGENT_ID:-paperclip-worker}
      - BRAIN_EXTERNAL_EXECUTOR_PERMIT_SECRET=${BRAIN_EXTERNAL_EXECUTOR_PERMIT_SECRET:-dev-executor-permit-secret-change-me}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - brain_local
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5).getcode()==200 else sys.exit(1)",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  controldeck:
    build:
      context: ./frontend/controldeck-v3
      args:
        NEXT_PUBLIC_BRAIN_API_BASE: http://backend:8000
    container_name: controldeck-v3
    restart: unless-stopped
    ports:
      - "3003:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_APP_ENV=local
      - NEXT_PUBLIC_BRAIN_API_BASE=http://backend:8000
      - NEXT_PUBLIC_AXE_UI_BASE=http://axe_ui:3000
    depends_on:
      backend:
        condition: service_healthy
      axe_ui:
        condition: service_started
    networks:
      - brain_local
    extra_hosts:
      - "host.docker.internal:host-gateway"

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    restart: unless-stopped
    ports:
      - "3000:8080"
    env_file:
      - .env.local
    volumes:
      - openwebui_data:/app/backend/data
    # depends_on: ollama - using local host ollama
    networks:
      - brain_local
    environment:
      - OLLAMA_BASE_URL=http://localhost:11434
      - WEBUI_SECRET_KEY=

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  ollama_data:
  openwebui_data:

networks:
  brain_local:
    driver: bridge
